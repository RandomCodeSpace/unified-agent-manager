name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...

      - name: Run SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Explain skipped SonarCloud scan
        if: env.SONAR_TOKEN == ''
        run: |
          echo "SONAR_TOKEN is not configured, so the SonarCloud scan was skipped."
          echo "Add a repository secret named SONAR_TOKEN to enable this check."
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
