sonar.projectKey=RandomCodeSpace_unified-agent-manager
sonar.organization=randomcodespace
sonar.projectName=unified-agent-manager
sonar.host.url=https://sonarcloud.io
sonar.qualitygate.wait=true

sonar.sources=.
sonar.exclusions=bin/**,.git/**,.github/**,.claude/**,**/testdata/**,**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/testdata/**
sonar.coverage.exclusions=**/testdata/**,**/*_test.go,**/*_darwin.go
sonar.go.coverage.reportPaths=coverage.out
sonar.sourceEncoding=UTF-8
