sonar.projectKey=RandomCodeSpace_unified-agent-manager
sonar.organization=randomcodespace
sonar.projectName=unified-agent-manager
sonar.host.url=https://sonarcloud.io
sonar.qualitygate.wait=true

sonar.sources=.
sonar.exclusions=bin/**,.git/**,.github/**,.claude/**,**/testdata/**,**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/testdata/**
sonar.coverage.exclusions=**/testdata/**,**/*_test.go,**/*_darwin.go,**/cmd/uam/main.go,internal/cli/daemon.go,internal/cli/internal_host.go,internal/cli/cli.go
# Coverage exclusions rationale:
#  - cmd/uam/main.go: subcommand dispatcher; tested via integration smoke.
#  - internal/cli/daemon.go: each run* helper calls os.Exit on error
#    paths; covered by the end-to-end TestEndToEndDispatchListPeekKill in
#    internal/ipcclient, plus daemon_test.go for the pidfile helper.
#  - internal/cli/internal_host.go: thin wrapper that fork+execs host.Run;
#    behavior is covered by host_test.go and the end-to-end smoke.
#  - internal/cli/cli.go: TUI startup; pre-existing exclusion convention
#    extended for the new UAM_BACKEND branch (TestNewServiceUsesTmuxByDefault
#    and TestNewServiceFallsBackToTmuxWhenSupervisorMissing exercise the
#    branch logic).
sonar.go.coverage.reportPaths=coverage.out
sonar.sourceEncoding=UTF-8
