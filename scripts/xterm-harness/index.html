<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>UAM terminal visual harness</title>
    <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css">
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #0b0d10; }
      body { box-sizing: border-box; padding: 24px; }
      #terminal { width: 1232px; height: 852px; }
    </style>
    <script src="./node_modules/@xterm/xterm/lib/xterm.js"></script>
  </head>
  <body>
    <div id="terminal"></div>
    <script>
      const terminal = new Terminal({
        cols: 110,
        rows: 32,
        scrollback: 10000,
        fontFamily: '"DejaVu Sans Mono", "Noto Sans Mono CJK JP", monospace',
        fontSize: 16,
        lineHeight: 1.1,
        cursorBlink: false,
        allowTransparency: false,
        theme: { background: "#0b0d10", foreground: "#e6edf3" }
      });
      terminal.open(document.getElementById("terminal"));
      window.renderAnsi = (base64, title) => new Promise((resolve) => {
        document.title = title;
        const bytes = Uint8Array.from(atob(base64), (char) => char.charCodeAt(0));
        terminal.write(bytes, () => requestAnimationFrame(() => requestAnimationFrame(() => {
          const buffer = terminal.buffer.active;
          const lines = [];
          for (let row = 0; row < buffer.length; row += 1) {
            const line = buffer.getLine(row);
            lines.push(line ? line.translateToString(true) : "");
          }
          window.__terminalText = lines.join("\n").replace(/\s+$/u, "") + "\n";
          resolve({ cols: terminal.cols, rows: terminal.rows, lineCount: lines.length });
        })));
      });
      window.resetTerminal = () => terminal.reset();
    </script>
  </body>
</html>
